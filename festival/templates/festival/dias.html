{% extends 'festival/layout.html' %}

{% block content %}

{% for dia in dias %}
<h2>{{ dia }}</h2>

    {% for concerto in dia.concertos.all %}
        <article class="card">
            <a href="{% url 'concerto' concerto.id %}">{{ concerto.banda.nome }} - {{ concerto.palco }}, {{ concerto.hora }}</a>
        </article>
    {% endfor %}

{% endfor %}

{% endblock %}
